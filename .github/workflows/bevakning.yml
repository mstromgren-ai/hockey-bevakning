name: Hockey Bevakning

on:
  schedule:
- cron: '0 5,10,16 * * *' 
  workflow_dispatch:

jobs:
  bevaka:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Kör bevakning
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bevakare.py

      - name: Spara seen_ads.json
        run: |
          git config user.name "Hockey Bot"
          git config user.email "bot@hockey-bevakning.se"
          git add seen_ads.json
          git diff --staged --quiet || git commit -m "Uppdatera seen ads [skip ci]"
          git push
